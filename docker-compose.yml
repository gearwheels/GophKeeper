version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gophkeeper
      POSTGRES_USER: gophkeeper
      POSTGRES_PASSWORD: gophkeeper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gophkeeper"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_ADDRESS: ":8080"
      DATABASE_URI: "postgres://gophkeeper:gophkeeper@postgres:5432/gophkeeper?sslmode=disable"
      JWT_SECRET: "change-me-in-production-at-least-32-bytes"
      LOG_LEVEL: "info"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
